<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Nền Dark Mode -->
    <rect width="1440" height="900" fill="#0F172A"/>

    <!-- Header Navigation -->
    <rect width="1440" height="70" fill="#1E293B"/>
    <text x="30" y="45" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22" font-weight="bold">MiniMart POS - Quầy Thu Ngân</text>
    
    <!-- Ca làm việc & Thu ngân -->
    <rect x="1150" y="15" width="260" height="40" rx="8" fill="#334155"/>
    <text x="1170" y="40" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14">Nhân viên: Nguyễn Văn A (Ca 1)</text>

    <!-- LEFT PANEL: Danh sách sản phẩm (70% width) -->
    <rect x="30" y="100" width="950" height="770" rx="12" fill="#1E293B"/>
    
    <!-- Search / Barcode -->
    <rect x="60" y="130" width="890" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <text x="80" y="160" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16">🔍 Quét mã vạch hoặc tìm tên sản phẩm (F2)...</text>
    
    <!-- Category Tabs -->
    <rect x="60" y="200" width="120" height="40" rx="20" fill="#6366F1"/>
    <text x="85" y="225" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Tất cả</text>
    <rect x="200" y="200" width="120" height="40" rx="20" fill="#334155"/>
    <text x="235" y="225" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Đồ uống</text>
    <rect x="340" y="200" width="120" height="40" rx="20" fill="#334155"/>
    <text x="370" y="225" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">Bánh kẹo</text>

    <!-- Lưới sản phẩm để bấm nhanh -->
    <!-- SP 1 -->
    <rect x="60" y="270" width="200" height="200" rx="12" fill="#334155"/>
    <rect x="60" y="270" width="200" height="120" rx="12" fill="#CBD5E1"/>
    <text x="120" y="340" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ảnh Nước Lọc</text>
    <text x="75" y="420" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Nước tinh khiết</text>
    <text x="75" y="450" fill="#10B981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">5.000 đ</text>

    <!-- SP 2 -->
    <rect x="290" y="270" width="200" height="200" rx="12" fill="#334155"/>
    <rect x="290" y="270" width="200" height="120" rx="12" fill="#CBD5E1"/>
    <text x="350" y="340" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ảnh Bánh</text>
    <text x="305" y="420" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Bánh mì ngọt</text>
    <text x="305" y="450" fill="#10B981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">12.000 đ</text>

    <!-- SP 3 -->
    <rect x="520" y="270" width="200" height="200" rx="12" fill="#334155"/>
    <rect x="520" y="270" width="200" height="120" rx="12" fill="#CBD5E1"/>
    <text x="580" y="340" fill="#475569" font-family="Arial, sans-serif" font-size="12">Ảnh Cafe</text>
    <text x="535" y="420" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Cà phê lon</text>
    <text x="535" y="450" fill="#10B981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">15.000 đ</text>


    <!-- RIGHT PANEL: Hóa Đơn (Bill) (30% width) -->
    <rect x="1010" y="100" width="400" height="770" rx="12" fill="#1E293B"/>
    
    <!-- Tiêu đề Hóa Đơn -->
    <rect x="1010" y="100" width="400" height="60" fill="#334155" rx="12"/>
    <text x="1030" y="138" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Hóa Đơn Hiện Tại (#INV-102)</text>
    
    <!-- Các món trong hóa đơn -->
    <text x="1030" y="190" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">1. Nước tinh khiết</text>
    <text x="1030" y="215" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">2 x 5.000</text>
    <text x="1330" y="215" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">10.000</text>
    
    <text x="1030" y="255" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">2. Bánh mì ngọt</text>
    <text x="1030" y="280" fill="#94A3B8" font-family="Arial, sans-serif" font-size="14">1 x 12.000</text>
    <text x="1330" y="280" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">12.000</text>

    <!-- Kẻ ngang -->
    <rect x="1030" y="550" width="360" height="2" fill="#475569"/>

    <!-- Tính tiền -->
    <text x="1030" y="580" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16">Tổng tiền hàng:</text>
    <text x="1330" y="580" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">22.000</text>
    
    <text x="1030" y="610" fill="#94A3B8" font-family="Arial, sans-serif" font-size="16">Chiết khấu VIP:</text>
    <text x="1330" y="610" fill="#F43F5E" font-family="Arial, sans-serif" font-size="16">0</text>

    <text x="1030" y="650" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22" font-weight="bold">KHÁCH PHẢI TRẢ:</text>
    <text x="1300" y="650" fill="#10B981" font-family="Arial, sans-serif" font-size="24" font-weight="bold">22.000</text>

    <!-- Nút Thanh toán -->
    <rect x="1030" y="700" width="360" height="60" rx="8" fill="#10B981"/>
    <text x="1140" y="738" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Thanh Toán (F9)</text>

    <rect x="1030" y="780" width="170" height="50" rx="8" fill="#334155"/>
    <text x="1065" y="812" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">Hủy đơn (F4)</text>

    <rect x="1220" y="780" width="170" height="50" rx="8" fill="#6366F1"/>
    <text x="1270" y="812" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">Chờ Bill</text>

</svg>
