<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Đăng nhập</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="login-page">
    <div class="login-bg">
        <div class="login-bg-shape" style="top: 10%; left: 10%; width: 300px; height: 300px; background: var(--primary); animation-delay: 0s;"></div>
        <div class="login-bg-shape" style="top: 50%; right: 10%; width: 400px; height: 400px; background: #ec4899; animation-delay: -5s;"></div>
        <div class="login-bg-shape" style="bottom: -10%; left: 30%; width: 350px; height: 350px; background: #06b6d4; animation-delay: -10s;"></div>
    </div>
    
    <div class="login-container glass">
        <div class="login-logo">
            <div class="login-logo-icon">🛒</div>
            <h1 class="login-title">MiniMart POS</h1>
            <p class="login-subtitle">Hệ thống quản lý bán hàng siêu thị mini</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-input" id="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-input" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
            </div>
            <div class="login-error" id="loginError">Tên đăng nhập hoặc mật khẩu không đúng</div>
            <button type="submit" class="btn btn-primary login-btn">Đăng nhập</button>
        </form>
        
        <div class="login-footer">
            Tài khoản demo: admin@gmail.com / 123456
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Check if already logged in and redirect to dashboard
        if (MiniMart.Auth.getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            
            // Call Backend API
            const submitBtn = document.querySelector('.login-btn');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Đang xử lý...';
            submitBtn.disabled = true;
            
            const user = await MiniMart.Auth.login(u, p);
            
            if (user) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').classList.add('show');
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
