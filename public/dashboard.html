<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMart POS - Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class='app-container'>
      <aside class='sidebar'>
        <div class='sidebar-brand'>
          <div class='sidebar-logo'>🛒</div>
          <div>
            <span class='sidebar-brand-name'>MiniMart POS</span>
            <span class='sidebar-brand-sub'>Quản lý siêu thị</span>
          </div>
        </div>
        <nav class='sidebar-nav'>
          <div class='sidebar-section'>
            <div class='sidebar-section-title'>Tổng quan</div>
            <a class='nav-link active' data-page='dashboard'>
              <span class='nav-icon'>📊</span> Dashboard
            </a>
            <a class='nav-link' data-page='pos'>
              <span class='nav-icon'>🛍️</span> Bán hàng
            </a>
          </div>
          <div class='sidebar-section'>
            <div class='sidebar-section-title'>Quản lý</div>
            <a class='nav-link' data-page='products'>
              <span class='nav-icon'>📦</span> Sản phẩm
            </a>
            <a class='nav-link' data-page='inventory'>
              <span class='nav-icon'>🏪</span> Tồn kho
            </a>
            <a class='nav-link' data-page='customers'>
              <span class='nav-icon'>👥</span> Khách hàng
            </a>
            <a class='nav-link' data-page='invoices'>
              <span class='nav-icon'>🧾</span> Hóa đơn
            </a>
          </div>
          <div class='sidebar-section'>
            <div class='sidebar-section-title'>Thống kê</div>
            <a class='nav-link' data-page='reports'>
              <span class='nav-icon'>📈</span> Báo cáo
            </a>
          </div>
        </nav>
        <div class='sidebar-footer'>
          <div class='sidebar-user'>
            <div class='sidebar-user-avatar' id='userAvatar'>A</div>
            <div class='sidebar-user-info'>
              <div class='sidebar-user-name' id='userName'>Admin</div>
              <div class='sidebar-user-role' id='userRole'>Quản lý</div>
            </div>
          </div>
        </div>
      </aside>
      <main class='main-area'>
        <header class='top-header'>
          <h1 class='page-title' id='pageTitle'>Dashboard</h1>
          <div class='header-actions'>
            <span class='text-secondary' id='currentDate'></span>
            <button class='btn btn-ghost' id='btnLogout'>🚪 Đăng xuất</button>
          </div>
        </header>
        <div class='content-area'>
          <div id='page-dashboard' class='page active'></div>
          <div id='page-pos' class='page'></div>
          <div id='page-products' class='page'></div>
          <div id='page-inventory' class='page'></div>
          <div id='page-customers' class='page'></div>
          <div id='page-invoices' class='page'></div>
          <div id='page-reports' class='page'></div>
        </div>
      </main>
    </div>
    <div class='modal-overlay' id='modalOverlay'>
      <div class='modal-content' id='modalContent'></div>
    </div>
    <div class='toast-container' id='toastContainer'></div>
    <div id='invoicePrint' class='invoice-print'></div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/pos.js"></script>
    <script src="js/products.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/customers.js"></script>
    <script src="js/invoices.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
